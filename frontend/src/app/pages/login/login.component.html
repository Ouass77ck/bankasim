<div class="login-wrapper">
  <div class="logo-section">
    <img src="logo-bankasim2.png" alt="Bankasim" class="logo" width="" />
    <h1>Contents de vous revoir!</h1>
  </div>

  <mat-card class="login-card">
    <form (ngSubmit)="onLogin()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Votre email</mat-label>
        <input matInput type="email" [(ngModel)]="email" name="email" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Votre mot de passe</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" required>
      </mat-form-field>

      <button mat-raised-button color="primary" class="login-btn" type="submit">
        Se connecter
      </button>
    </form>
  </mat-card>

</div>
