<mat-toolbar color="primary">Mes transactions</mat-toolbar>

<mat-card>
  <table mat-table [dataSource]="transactions" class="mat-elevation-z8">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let t"> {{ t.transactionId }} </td>
    </ng-container>

    <ng-container matColumnDef="ribDestinataire">
      <th mat-header-cell *matHeaderCellDef> RIB Destinataire </th>
      <td mat-cell *matCellDef="let t"> {{ t.ribDestinataire }} </td>
    </ng-container>

    <ng-container matColumnDef="montant">
      <th mat-header-cell *matHeaderCellDef> Montant </th>
      <td mat-cell *matCellDef="let t"> {{ t.montant | currency:'EUR' }} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
