<mat-toolbar class="navbar">
  <div class="nav-left">
    <img src="logo-bankasim2.png" alt="Bankasim" class="logo" />
  </div>

  <div class="nav-center">
    <button mat-button routerLink="/home">home</button>
    <button mat-button routerLink="/createtransaction">faire un virement</button>
    <button mat-button routerLink="/mestransactions">mes transactions</button>
  </div>

  <div class="nav-right">
    <button mat-button [matMenuTriggerFor]="menu">{{ account?.prenom }}</button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="logout()" routerLink="/login">Se déconnecter</button>
    </mat-menu>
  </div>
</mat-toolbar>

<div class="transactions-container">
  <h1>Mes transactions</h1>

  <mat-card class="transactions-card">
    <table mat-table [dataSource]="transactions" class="transactions-table">

      <ng-container matColumnDef="ribDestinataire">
        <th mat-header-cell *matHeaderCellDef> Destinataire </th>
        <td mat-cell *matCellDef="let t"> {{ t.ribAffiche }} </td>
      </ng-container>

      <ng-container matColumnDef="montant">
        <th mat-header-cell *matHeaderCellDef> Montant </th>
        <td mat-cell *matCellDef="let t"> {{ t.montantAffiche }} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Statut </th>
        <td mat-cell *matCellDef="let t" [ngClass]="t.status.toLowerCase()">
          {{ t.status }}
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Motif </th>
        <td mat-cell *matCellDef="let t"> {{ t.description }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
